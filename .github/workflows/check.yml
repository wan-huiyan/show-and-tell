name: checks
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: template passes its own render-safety check
        run: python3 scripts/check_html.py assets/template.html --template

      - name: plugin copy is in sync with the root skill
        run: |
          ./sync-plugin.sh
          if ! git diff --quiet -- plugins; then
            git --no-pager diff --stat -- plugins
            echo "::error::plugin copy is out of sync with the root skill — run ./sync-plugin.sh and commit"
            exit 1
          fi
